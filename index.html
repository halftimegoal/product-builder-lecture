<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-1677053107217470">
  <title>Lotto Number Drawer</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1677053107217470" crossorigin="anonymous"></script>
  <link href='./style.css' rel='stylesheet'>
  </head>
  <body>
  <div class="theme-toggle">
    <button id="theme-button">🌙 Dark Mode</button>
  </div>
  <h1>Lotto Number Drawer</h1>
  <div class="lotto-numbers"></div>
  <button id="draw-button">Draw Numbers</button>

  <div class="contact-form">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/xgonkerq" method="POST">
      <div class="form-group">
        <label for="name">이름/회사명</label>
        <input type="text" id="name" name="name" required placeholder="홍길동 / (주)파트너">
      </div>
      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="category">문의 유형</label>
        <select id="category" name="category">
          <option value="partnership">비즈니스 제휴</option>
          <option value="advertisement">광고 문의</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="5" required placeholder="제휴하고 싶은 내용을 적어주세요."></textarea>
      </div>
      <button type="submit" class="submit-button">문의하기</button>
    </form>
  </div>
